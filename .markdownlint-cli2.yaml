# markdownlint-cli2 configuration
# https://github.com/DavidAnson/markdownlint-cli2
# Run: npx markdownlint-cli2 "**/*.md"
# Fix: npx markdownlint-cli2 --fix "**/*.md"

config:
  # ============================================================
  # PERMANENTLY DISABLED — conflict with project documentation style
  # ============================================================

  # Line-length — long URLs, tables, code examples, ASCII diagrams
  MD013: false

  # Inline HTML — <img> tags for screenshots/badges in README
  MD033: false

  # Duplicate headings — section names repeat across platform guides
  MD024: false

  # Emphasis as heading — bold text used as sub-labels in lists
  MD036: false

  # ============================================================
  # STYLE SETTINGS
  # ============================================================

  # Table column style — disabled because several tables include emoji /
  # CJK / wide Unicode characters where true visual alignment cannot be
  # achieved with ASCII pipe padding alone. Tables are still formatted
  # with markdown-table-formatter as a best effort.
  MD060: false

# Ignore generated/vendored/test fixture files
ignores:
  - "node_modules/**"
  - ".claude/**"
  - "scripts/aidlc-evaluator/test_cases/**"
  # CHANGELOG.md is auto-generated by git-cliff (cliff.toml controls its format).
  # git-cliff postprocessors run per-body so inter-body spacing and trailing
  # whitespace cannot be fully controlled via template alone.
  - "CHANGELOG.md"
  # Benchmark runner artefacts — raw LLM outputs, not part of repo docs.
  # Regenerated locally via docs/benchmark/runners/. Gitignored at runtime.
  - "docs/benchmark/results/**"
  # Python virtualenv bundled with vendored package READMEs. Gitignored too,
  # but added here so `npx markdownlint-cli2 "**/*.md"` run locally before
  # commit does not trip on vendored package READMEs.
  - "docs/benchmark/runners/.venv/**"
